# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Builds the pkgdown site and deploys it to the gh-pages branch.
on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'NOTES.md'
      - 'dev/**'
      - 'tests/**'
      - 'data-raw/**'
      - '.github/workflows/R-CMD-check.yaml'
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        # examples = FALSE: the reference examples are real model fits (~50 min
        # on a runner); pages show the example code without executed output.
        # They are `\donttest`, so nothing else runs them either -- execute
        # devtools::run_examples() locally before releases (see NOTES.md).
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE, examples = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
